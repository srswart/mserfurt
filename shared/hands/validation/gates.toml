[stages.word.metrics.baseline_drift_ratio]
op = "<="
threshold = 0.15
required = true

[stages.stateful_word]
label = "Stateful word checkpoint"

[stages.stateful_word.metrics.continuity_score]
op = ">="
threshold = 0.90
