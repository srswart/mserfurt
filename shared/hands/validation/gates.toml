[stages.folio.metrics.downstream_contract_pass_rate]
op = "=="
threshold = 1.0
required = true

[stages.folio.metrics.weather_acceptance]
op = "=="
threshold = 1.0
required = true

[stages.folio.metrics.readability_regression_delta]
op = "<="
