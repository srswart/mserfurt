# TD-014 hand validation promotion gates

[stages.primitive]
label = "Primitive checkpoint"

[stages.primitive.metrics.corridor_containment]
op = ">="
threshold = 0.98
required = true

[stages.primitive.metrics.self_intersections]
op = "=="
threshold = 0
required = true

[stages.primitive.metrics.contact_accuracy]
op = ">="
threshold = 0.99
required = true

[stages.primitive.metrics.width_profile_error]
op = "<="
threshold = 0.15
required = true

[stages.pathguide_dataset]
label = "Starter alphabet dataset"

[stages.pathguide_dataset.metrics.required_symbol_coverage]
op = "=="
threshold = 1.0
required = true

[stages.pathguide_dataset.metrics.structural_validity_ratio]
op = "=="
threshold = 1.0
required = true

[stages.pathguide_dataset.metrics.self_intersection_free_ratio]
op = "=="
threshold = 1.0
required = true

[stages.pathguide_dataset.metrics.join_schedule_ratio]
op = "=="
threshold = 1.0
required = true

[stages.pathguide_dataset.metrics.accepted_source_ratio]
op = "=="
threshold = 1.0
required = true

[stages.pathguide_dataset.metrics.heldout_symbol_coverage]
op = ">="
threshold = 0.20
required = true

[stages.glyph]
label = "Glyph checkpoint"

[stages.glyph.metrics.template_score]
op = ">="
threshold = 0.90
required = true

[stages.glyph.metrics.dtw_centerline_distance]
op = "<="
threshold = 0.20
required = true

[stages.glyph.metrics.uncontrolled_exit_count]
op = "=="
threshold = 0
required = true

[stages.glyph.metrics.thick_thin_ratio_error]
op = "<="
threshold = 0.15
required = true

[stages.join]
label = "Join checkpoint"

[stages.join.metrics.continuity_score]
op = ">="
threshold = 0.90
required = true

[stages.join.metrics.forced_lift_count]
op = "=="
threshold = 0
required = true

[stages.join.metrics.uncontrolled_exit_count]
op = "=="
threshold = 0
required = true

[stages.join.metrics.dtw_centerline_distance]
op = "<="
threshold = 0.20
required = true

[stages.word]
label = "Word checkpoint"

[stages.word.metrics.continuity_score]
op = ">="
threshold = 0.90
required = true

[stages.word.metrics.forced_lift_count]
op = "=="
threshold = 0
required = true

[stages.word.metrics.ocr_proxy_score]
op = ">="
