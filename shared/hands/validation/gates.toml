[stages.stateful_word.metrics.forced_lift_count]
op = "=="
threshold = 0
required = true

[stages.stateful_word.metrics.ocr_proxy_score]
op = ">="
threshold = 0.88
required = true

[stages.stateful_word.metrics.baseline_drift_ratio]
op = "<="
threshold = 0.15
required = true

[stages.stateful_word.metrics.ink_state_monotonicity]
