system:
  id: xl
  name: "XL — Reverse Translation & Folio Structuring"
  description: >
    Takes the English manuscript text of MS Erfurt Aug. 12°47 and produces
    per-folio translations in Frühneuhochdeutsch with embedded Ecclesiastical
    Latin, structured into a dynamic private-manuscript folio sequence with
    standard stock through f13 and smaller irregular stock from f14 onward.
    Emits folio JSON, PAGE XML, and manifest for downstream phases.
  roots:
    - "xl/**"
  default_branch: main

pipeline:
  position: 1
  inputs:
    - source/ms-erfurt-source-annotated.md
  outputs:
    - "Per-folio JSON ({folio_id}.json)"
    - "manifest.json"
    - "PAGE XML ({folio_id}.xml) — text-only, normalized coordinates"
  consumers: [scribesim, weather]
  contracts:
    - docs/tech-direction/TD-001-interface-contracts.md#td-001-a-folio-json
    - docs/tech-direction/TD-001-interface-contracts.md#td-001-b-manifest-json
    - docs/tech-direction/TD-001-interface-contracts.md#td-001-c-page-xml

policies:
  advance_required_on_pr: true
  resident_gates:
    require_owner_approval: true
    require_invariant_impact_statement: true
    require_rollback_plan: true
    require_evidence_links: true

reviewability:
  thresholds:
    green: 30
    yellow: 60
  scoring_rules_version: 1

# Components defined in arrive/systems/xl/components/*.yaml
